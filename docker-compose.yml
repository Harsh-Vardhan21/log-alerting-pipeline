version: "3.9"

services:
  log-generator:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-u", "log_generator.py"]
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - log-net

  log-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - log-net
    depends_on:
      - log-generator

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/logs
    environment:
      - LOGS_DIR=/logs
    restart: unless-stopped
    networks:
      - log-net
    depends_on:
      - log-monitor

networks:
  log-net:
    driver: bridge
